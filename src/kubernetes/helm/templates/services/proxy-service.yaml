{{- if .Values.proxyService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proxy-service
    app.kubernetes.io/name: {{ include "cinemaabyss.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.proxyService.replicas }}
  selector:
    matchLabels:
      app: proxy-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proxy-service
    spec:
      containers:
      - name: proxy-service
        #ghcr.io/ogonik/architecture-cinemaabyss/proxy-service
        image: {{ .Values.proxyService.image.repository }}:{{ .Values.proxyService.image.tag }}
        imagePullPolicy: {{ .Values.proxyService.image.pullPolicy}}
        ports:
        - containerPort: {{ .Values.proxyService.ports.containerPort }}
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        - name: ASPNETCORE_URLS
          value: "http://+:{{ .Values.proxyService.service.targetPort }}"
        - name: ASPNETCORE_HTTP_PORTS
          value: "{{ .Values.proxyService.service.targetPort }}"
        - name: MONOLITH_URL
          value: "http://monolith:{{ .Values.monolith.service.targetPort }}"
        - name: MOVIES_SERVICE_URL
          value: "http://movies-service:{{ .Values.moviesService.service.targetPort }}"
        - name: EVENTS_SERVICE_URL
          value: "http://events-service:{{ .Values.eventsService.service.targetPort }}"
        - name: GRADUAL_MIGRATION
          value: "{{ .Values.config.gradualMigration }}"
        - name: MOVIES_MIGRATION_PERCENT
          value: "{{ .Values.config.moviesMigrationPercent }}"
        envFrom:
        - configMapRef:
            name: cinemaabyss-config
        - secretRef:
            name: cinemaabyss-secrets
        resources:
          limits:
            cpu: "{{ .Values.proxyService.resources.limits.cpu }}"
            memory: "{{ .Values.proxyService.resources.limits.memory }}"
          requests:
            cpu: "{{ .Values.proxyService.resources.requests.cpu }}"
            memory: "{{ .Values.proxyService.resources.requests.memory }}"
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.proxyService.service.targetPort }}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.proxyService.service.targetPort }}
          initialDelaySeconds: 15
          periodSeconds: 20
      restartPolicy: Always
      imagePullSecrets:
        - name: dockerconfigjson
---
apiVersion: v1
kind: Service
metadata:
  name: proxy-service
  namespace: {{ .Values.global.namespace }}
  labels:
    app: proxy-service
    app.kubernetes.io/name: {{ include "cinemaabyss.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  selector:
    app: proxy-service
  ports:
  - port: {{ .Values.proxyService.service.port }}
    targetPort: {{ .Values.proxyService.service.targetPort }}
  type: ClusterIP
{{- end }}